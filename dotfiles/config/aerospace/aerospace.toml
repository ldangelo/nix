# AeroSpace Config - Leo D'Angelo
# https://nikitabobko.github.io/AeroSpace/commands

after-login-command = []
after-startup-command = [
  'exec-and-forget sleep 8 && ~/.config/aerospace/resort-windows.sh',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Accordion padding
accordion-padding = 30

# Layout defaults
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Disable macOS "Hide application" (cmd-h)
automatically-unhide-macos-hidden-apps = false

# Keep primary workspaces always visible in menubar
[workspace-to-monitor-force-assignment]
1 = 'main'        # Home
D = 'main'        # Development
C = 'main'        # Communication
E = 'main'        # Entertainment
O = 'main'        # Organization
T = 'main'        # Trading

[key-mapping]
preset = 'qwerty'

# Gaps
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 10
outer.right = 10

# ============================================================
# Main binding mode
# ============================================================
[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus (vim-style + arrows)
alt-f = 'fullscreen'
alt-h = 'focus left'
alt-left = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-right = 'focus right'

# Focus cycle (dfs order — cycle through all windows)
alt-n = 'focus dfs-next'
alt-shift-n = 'focus dfs-prev'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Swap windows (rearrange without changing layout)
ctrl-alt-h = 'swap left'
ctrl-alt-j = 'swap down'
ctrl-alt-k = 'swap up'
ctrl-alt-l = 'swap right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Workspaces
alt-1 = 'workspace 1' # Home
alt-d = 'workspace D' # Development
alt-c = 'workspace C' # Communication
alt-e = 'workspace E' # Entertainment
alt-o = 'workspace O' # Organization
alt-t = 'workspace T' # Trading

# Move node to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-d = 'move-node-to-workspace D'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-f = 'move-node-to-workspace F'
alt-shift-g = 'move-node-to-workspace G'
alt-shift-i = 'move-node-to-workspace I'
alt-shift-m = 'move-node-to-workspace M'
# NOTE: alt-shift-n is now 'focus dfs-prev' — use service mode to move to N if needed
alt-shift-o = 'move-node-to-workspace O'
alt-shift-p = 'move-node-to-workspace P'
alt-shift-q = 'move-node-to-workspace Q'
alt-shift-r = 'move-node-to-workspace R'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-t = 'move-node-to-workspace T'
alt-shift-u = 'move-node-to-workspace U'
alt-shift-v = 'move-node-to-workspace V'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-x = 'move-node-to-workspace X'
alt-shift-y = 'move-node-to-workspace Y'
alt-shift-z = 'move-node-to-workspace Z'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter service mode
alt-shift-semicolon = 'mode service'

# ============================================================
# Service binding mode
# ============================================================
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # toggle floating
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# Move to workspace N (since alt-shift-n is taken in main mode)
n = ['move-node-to-workspace N', 'mode main']

# Arrange Communication workspace: Mail left, chat apps accordion right
# Usage: alt-shift-; then c
c = ['workspace C', 'focus right', 'layout accordion horizontal', 'mode main']

# ============================================================
# Window detection rules — auto-assign apps to workspaces
# ============================================================

# Terminal → Home
[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = ['move-node-to-workspace 1']

# Slack → Communications
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace C']

# Zoom → Communications
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-workspace C']

# GoTo Meeting → Communications
[[on-window-detected]]
if.app-id = 'com.logmein.goto'
run = ['move-node-to-workspace C']

# Messages → Communications
[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = ['move-node-to-workspace C']

# Discord → Communications
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['move-node-to-workspace C']

# Telegram → Communications
[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = ['move-node-to-workspace C']

# Spark Mail → Communications (left tile)
[[on-window-detected]]
if.app-id = 'com.readdle.SparkDesktop'
run = ['move-node-to-workspace C']

# Fantastical → Organization
[[on-window-detected]]
if.app-id = 'com.flexibits.fantastical2.mac'
run = ['move-node-to-workspace O']

# Obsidian → Organization
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['move-node-to-workspace O']

# Timing → Organization
[[on-window-detected]]
if.app-id = 'info.eurocomp.Timing-setapp'
run = ['move-node-to-workspace O']

# Music → Entertainment
[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = ['move-node-to-workspace E']

# TradingView → Trading
[[on-window-detected]]
if.app-id = 'com.tradingview.tradingviewapp.desktop'
run = ['move-node-to-workspace T']

# IntelliJ → Development
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = ['move-node-to-workspace D']

# Float System Preferences
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating']
